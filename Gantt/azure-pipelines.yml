trigger:
  branches:
     include:
         - hotfix/*
         - release/*
     exclude:
         - BLAZ*
         - EJ2*
         - blaz*
         - ej2*

variables:
- group: Build-Variables

pool:
  BlazorTests

jobs:
- job: Playwright_CR_Issues 
  displayName: Playwright Automation
  condition: eq(variables['Build.SourceBranchName'], variables['BranchName'])
  timeoutInMinutes: 500
  steps:
    - task: NodeTool@0
      displayName: Node Installation
      inputs:
        versionSource: 'spec'
        versionSpec: '16.x'
    
    - task: UseDotNet@2
      displayName: NET 8 SDK Installation
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: Npm@1
      displayName: NPM Installation
      inputs:
        command: 'install'

    - task: CmdLine@2
      displayName: Playwright Installation
      inputs:
        script: 'npx playwright install'

    - task: Npm@1
      displayName: Branch Switching
      inputs:
        command: 'custom'
        customCommand: 'run branch-switch -- $(Git_Branch)'
    
    - task: DotNetCoreCLI@2
      displayName: Sample Build & Publish
      inputs:
        command: 'build'
        projects: './sample/server/SyncfusionBlazorApp.csproj'
        arguments: '-c Release'  
    
    - task: DotNetCoreCLI@2
      displayName: Sample Build & Publish
      inputs:
        command: 'build'
        projects: './sample/localization/Localisation.csproj'
        arguments: '-c Release'

    - task: CmdLine@2
      displayName: Run Test
      continueOnError: true
      inputs:
        script: 'npx playwright test CR_Issues --project=chromium'

    - task: gulp@0
      displayName: Sort Snapshots
      inputs:
        gulpFile: 'gulpfile.js'
        targets: 'sort-snapshots'
        gulpjs: 'node_modules/gulp/bin/gulp.js'
        enableCodeCoverage: false
    
    - task: CopyFiles@2
      displayName: Copy Results
      inputs:
        contents: 'playwright-report/**'
        targetFolder: $(Build.ArtifactStagingDirectory)

    - task: PublishBuildArtifacts@1
      displayName: Artifact Results
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)
        artifactName: CR_Issues
        publishLocation: 'Container'

    - task: Npm@1
      displayName: Send Report
      inputs:
        command: 'custom'
        customCommand: 'run playwright-report -- $(Agent.JobStatus);$(Build.Repository.Name);$(Build.SourceBranchName);CR_Issues'

